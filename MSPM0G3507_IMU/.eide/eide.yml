version: "4.1"
name: MSPM0G3507_IMU
type: ARM
deviceName: null
packDir: null
srcDirs:
  - Algorithm
  - BSP
  - Drivers
  - User
  - generated/syscfg
virtualFolder:
  name: <virtual_root>
  files:
    - path: startup/startup_mspm0g350x_gcc.c
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 0f21c1d0503624fd9ea8ed3d81d06332
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - __MSPM0G3507__
        - __USE_SYSCONFIG__
        - ARM_MATH_CM0
      incList:
        - Algorithm
        - BSP
        - Drivers
        - User
        - generated/syscfg
        - ${MSPM0_SDK_ROOT}/source
        - ${MSPM0_SDK_ROOT}/source/third_party/CMSIS/Core/Include
        - ${MSPM0_SDK_ROOT}/source/third_party/CMSIS/DSP/Include
      libList:
        - ${MSPM0_SDK_ROOT}/source
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M0+
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks:
            - name: Syscfg Pre-build
              abortAfterFailed: false
              command: '"${ProjectRoot}\tools\generate_syscfg.cmd"'
              disable: false
              stopBuildAfterFailed: true
          c/cpp-compiler:
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: softfp
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            $toolName: auto
            LD_FLAGS: -nostartfiles -static
            LIB_FLAGS: -l:third_party/CMSIS/DSP/lib/gcc/m0p/arm_cortexM0l_math.a -Tgenerated/syscfg/device.lds.genlibs -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: generated/syscfg/device_linker.lds
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x00000000"
        bin: ""
        interface: xds110
        target: ti_mspm0
    uploader: OpenOCD
